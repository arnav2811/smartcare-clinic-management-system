<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/adminDashboard.css">
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="brand">
            <div class="logo">SC</div>
            <div>
                <div class="title">SmartCare - Admin</div>
                <div class="muted">Clinic Management System</div>
            </div>
        </div>
        <div class="controls">
            <div class="search-row">
                <input type="text" id="doctorSearch" placeholder="Search Doctor">
                <select id="specialtyFilter">
                    <option value="">All Specialties</option>
                </select>
            </div>
            <div>
                <button id="addDoctorBtn" class="btn">Add Doctor</button>
            </div>
        </div>
    </header>

    <main>
        <section class="card" id="doctorListContainer">
            <h2>Doctors</h2>
            <div id="doctorList" class="list-grid">
                <!-- doctor cards inserted here -->
            </div>
            <div id="doctorEmpty" class="empty" style="display:none">No doctors found.</div>
        </section>
    </main>

    <footer style="margin-top:18px;text-align:center;color:var(--muted);font-size:13px">© SmartCare</footer>
</div>

<script src="/js/adminDashboard.js"></script>

</body>
</html>
